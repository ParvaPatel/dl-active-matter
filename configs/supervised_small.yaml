# Supervised Baseline — end-to-end training
# Same encoder architecture as JEPA/VideoMAE for fair comparison.
# Directly predicts (alpha, zeta) with a linear head + MSE loss.
# Provides the UPPER BOUND on representation quality.

experiment_name: supervised_small

seed: 42

# --- Data ---
data_dir: /scratch/${USER}/data/active_matter
in_channels: 11
n_frames: 16           # only need 16 frames (no context/target split needed)
batch_size: 32          # Supervised has no EMA/predictor → ~40% lighter than JEPA. JEPA@BS4=3.2GB, so sup@BS32≈20GB
num_workers: 4

# --- Encoder (same as JEPA/VideoMAE Small for fair comparison) ---
patch_size: [2, 16, 16]
embed_dim: 384
encoder_depth: 6
num_heads: 6
mlp_ratio: 4.0
drop_rate: 0.1        # slightly more regularization for supervised

# --- Optimizer ---
lr: 3e-4
weight_decay: 0.05
betas: [0.9, 0.95]
grad_clip: 1.0
compile: true

# --- Training ---
epochs: 100
checkpoint_dir: /scratch/${USER}/checkpoints
checkpoint_every: 5

# --- Logging ---
wandb_project: dl-active-matter
