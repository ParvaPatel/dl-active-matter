# Video-JEPA v3 Tuned — Best hyperparameters from Optuna HPO sweep (20 trials)
#
# HPO Results Summary:
#   Best trial: #15 | val_loss: 0.2752
#   Key findings:
#     - var_weight should be ~0.25-0.30 (NOT 1.0 — our v3 default was 4x too high)
#     - lr should be ~3-5e-4 (NOT 1.5e-4 — optimal is 2-3x higher than default)
#     - cov_weight ~0.005-0.01 is correct (our v3 default of 0.01 was well-calibrated)
#     - weight_decay: slightly higher than 0.05 helps (optimal ~0.05-0.09)
#
# All pruned trials (4, 6, 7, 8, 10, 14, 16, 17, 18, 20) had var_weight >= 1.0 or low lr.
# Confirms: prediction loss must STRONGLY dominate. var_weight=1.0 is still too high.

experiment_name: jepa_v3_tuned

seed: 42

# --- Data ---
data_dir: /scratch/${USER}/data/active_matter
in_channels: 11
n_frames: 32
context_frames: 16
batch_size: 4
num_workers: 4

# --- Encoder (unchanged for fair comparison) ---
patch_size: [2, 16, 16]
embed_dim: 384
encoder_depth: 6
num_heads: 6
mlp_ratio: 4.0
drop_rate: 0.0

# --- JEPA Predictor (unchanged) ---
predictor_dim: 256
predictor_depth: 3
predictor_heads: 4

# --- EMA Schedule (unchanged) ---
ema_momentum_start: 0.996
ema_momentum_end: 0.999

# --- VICReg Regularization (HPO-tuned — significantly different from v3 defaults) ---
var_weight: 0.256809   # was 1.0 — HPO found optimal is 4x lower
cov_weight: 0.009520   # was 0.01 — essentially confirmed correct
var_gamma: 1.0

# --- Optimizer (HPO-tuned, batch-size corrected) ---
# HPO found lr=3.4e-4 with bs=16. Full training uses effective bs=8 (4×2 accum).
# Linear scaling rule: lr ∝ bs → 3.4e-4 × (8/16) = 1.7e-4
lr: 1.7e-4
min_lr: 1.0e-6
weight_decay: 0.086518
betas: [0.9, 0.95]
warmup_epochs: 10
grad_clip: 1.0

# --- Performance Optimizations ---
grad_accum_steps: 2
# Early stopping: warmup causes val loss to temporarily increase (expected).
# Don't start counting "no improvement" until after warmup(10) + grace(10) = epoch 20.
early_stopping_patience: 20    # epochs of no improvement before stopping
early_stopping_start_epoch: 20 # warmup(10) + grace period(10)
compile: true


# --- Training ---
epochs: 100
checkpoint_dir: /scratch/${USER}/checkpoints
checkpoint_every: 5

# --- Logging ---
wandb_project: dl-active-matter
